name: Auto Release PR

on:
  push:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR from develop to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists, skipping."
            exit 0
          fi
          gh pr create \
            --base main \
            --head develop \
            --title "Release: develop → main" \
            --body "Automated PR to merge develop into main for release."
